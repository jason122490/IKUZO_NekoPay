<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}IKUZO✝NekoPay{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css?v={{ asset_v }}">
  <script>window.CSRF = "{{ csrf|default('') }}";</script>
</head>
<body>
  <header class="nav">
    <a href="/dashboard" class="brand">IKUZO✝NekoPay</a>
    <nav>
      {% if member %}
        <span class="who">{{ member.display_name }} · {{ ROLE_LABELS.get(member.role, member.role) }}</span>
        <a href="/dashboard">總覽</a>
        <a href="/records">我的紀錄</a>
        <a href="/vip">VIP等級</a>
        <a href="/help">使用說明</a>
        {% if member.role == 'admin' %}<a href="/admin">歸戶/對帳</a><a href="/admin/members">成員管理</a><a href="/admin/history">同步紀錄</a>{% endif %}
        <form method="post" action="/logout" class="inline"><button class="link">登出</button></form>
      {% endif %}
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer class="site-footer">
    <div>Created by Claude Code with Opus 4.8</div>
    <div>聯絡我們：<a href="mailto:jason122490@gmail.com">jason122490@gmail.com</a></div>
  </footer>
  <script src="/static/app.js?v={{ asset_v }}"></script>
</body>
</html>
