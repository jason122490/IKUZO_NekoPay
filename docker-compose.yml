services:
  app:
    build: .
    env_file: .env
    environment:
      - ENV=prod
    volumes:
      - nekopay-data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    image: caddy:2
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  nekopay-data:
  caddy-data:
  caddy-config:
